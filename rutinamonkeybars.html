<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<title>Rutina Monkey Bars PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #22c55e;
}

.exercise {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 12px;
    transition: 0.3s;
}

.exercise.done {
    opacity: 0.5;
    text-decoration: line-through;
}

img {
    width: 100%;
    max-width: 420px;
    border-radius: 10px;
    margin-top: 10px;
}

h2 {
    color: #38bdf8;
}

small {
    color: #94a3b8;
}
</style>
</head>

<body>

<h1>🏋️ Rutina Monkey Bars - Principiantes</h1>

<div id="container"></div>

<script>
const exercises = [
{
name: "Cuelgue Pasivo (Dead Hang)",
desc: `
Fortalece el agarre y adapta tus hombros al peso corporal.

✔ Agarrá la barra con las palmas hacia adelante  
✔ Dejá el cuerpo completamente relajado  
✔ Activá levemente el abdomen para evitar balanceo  
✔ No encojas los hombros, dejalos bajar naturalmente  

⚠ Error común: tensar demasiado los brazos o balancearse.

🎯 Objetivo: 15-30 segundos
`,
gif: "deadhang.gif"
},
{
name: "Flexiones Inclinadas",
desc: `
Ejercicio ideal para empezar a desarrollar fuerza de empuje.

✔ Cuerpo recto (como tabla)  
✔ Bajá el pecho hacia la barra, no la cabeza  
✔ Codos cerca del cuerpo (no abiertos)  
✔ Empujá fuerte al subir  

⚠ Error común: arquear la espalda o hacer media repetición.

🎯 Objetivo: 8-12 repeticiones
`,
gif: "flexinclinadas.gif"
},
{
name: "Remo Australiano",
desc: `
Trabaja la espalda y es clave para progresar a dominadas.

✔ Cuerpo alineado todo el tiempo  
✔ Tirar con la espalda, no solo brazos  
✔ Llevar el pecho a la barra  
✔ Controlar la bajada  

⚠ Error común: encorvarse o usar impulso.

🎯 Objetivo: 8-12 repeticiones
`,
gif: "remoaustralian.gif"
},
{
name: "Fondos en Barra (Negativos)",
desc: `
Ejercicio avanzado adaptado para principiantes.

✔ Subite a la posición inicial (arriba)  
✔ Bajá MUY lento (3-5 segundos)  
✔ Codos hacia atrás, no hacia afuera  
✔ Control total del movimiento  

⚠ Error común: dejarse caer sin control.

🎯 Objetivo: 5-8 repeticiones
`,
gif: "fondosbarra.gif"
},
{
name: "Sentadillas Asistidas",
desc: `
Perfecto para aprender la técnica correcta de piernas.

✔ Espalda recta  
✔ Rodillas alineadas con los pies  
✔ Bajar como si te sentaras  
✔ Peso en los talones  

⚠ Error común: levantar talones o inclinarse demasiado adelante.

🎯 Objetivo: 12-15 repeticiones
`,
gif: "sentadillasasistida.gif"
},
{
name: "Elevaciones de Rodillas",
desc: `
Ejercicio clave para el core y control corporal.

✔ Evitar balanceo  
✔ Subir rodillas usando el abdomen  
✔ Bajar lento y controlado  
✔ No usar impulso  

⚠ Error común: balancearse como péndulo.

🎯 Objetivo: 8-12 repeticiones
`,
gif: "elevacionrodillas.gif"
}
];

const container = document.getElementById("container");
let state = JSON.parse(localStorage.getItem("rutina")) || {};

exercises.forEach((ex, i) => {
    const div = document.createElement("div");
    div.className = "exercise";

    if (state[i]) div.classList.add("done");

    div.innerHTML = `
        <label>
            <input type="checkbox" ${state[i] ? "checked" : ""} onchange="toggle(${i}, this)">
            <h2>${ex.name}</h2>
        </label>
        <pre style="white-space: pre-wrap;">${ex.desc}</pre>
        <img src="${ex.gif}" alt="${ex.name}">
    `;

    container.appendChild(div);
});

function toggle(index, checkbox) {
    const item = document.getElementsByClassName("exercise")[index];

    if (checkbox.checked) {
        item.classList.add("done");
        state[index] = true;
    } else {
        item.classList.remove("done");
        state[index] = false;
    }

    localStorage.setItem("rutina", JSON.stringify(state));
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker registrado"));
}
</script>
</body>
</html>
